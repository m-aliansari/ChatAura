name: CI

on:
    push:
        branches: [master]
    pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Lint + tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc

            # Corepack activates the pinned Yarn 4 (package.json packageManager).
            # Must run before any `yarn` invocation; this is also why setup-node's
            # `cache: yarn` is not used (it would call Yarn before Corepack).
            - name: Enable Corepack
              run: corepack enable

            - name: Install dependencies
              run: yarn install --immutable

            - name: Install Playwright browsers
              run: yarn workspace @realtime-chatapp/client exec playwright install --with-deps

            - name: Format check
              run: yarn format:check

            - name: Lint
              run: yarn lint

            - name: Unit tests
              run: yarn test

            - name: Integration tests (Testcontainers / Docker)
              run: yarn test:integration

            - name: E2E tests (Playwright, Docker)
              run: yarn test:e2e

            - name: Upload Playwright report
              if: ${{ failure() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      packages/client/playwright-report/
                      packages/client/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

    # Triggers the Netlify build hook ONLY after `test` passes, on pushes to master.
    # A red suite means `test` fails, this job is skipped, and the client never
    # deploys. (Render gates the server independently via its "After CI Checks
    # Pass" auto-deploy setting, so it needs no step here.)
    deploy-client:
        name: Deploy client (Netlify)
        needs: test
        if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Netlify build hook
              env:
                  NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
              run: |
                  if [ -z "$NETLIFY_BUILD_HOOK" ]; then
                    echo "NETLIFY_BUILD_HOOK secret is not set" >&2
                    exit 1
                  fi
                  curl -fsSL -X POST -d '{}' "$NETLIFY_BUILD_HOOK"
