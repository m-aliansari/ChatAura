name: CI

on:
    push:
        branches: [master]
    pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint & format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            # Corepack activates the pinned Yarn 4 (package.json packageManager).
            # Must run before any `yarn` call; this is also why setup-node's
            # `cache: yarn` is not used (it would call Yarn before Corepack).
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            - name: Format check
              run: yarn format:check
            - name: Lint
              run: yarn lint

    unit:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            - name: Unit tests
              run: yarn test

    integration:
        name: Integration tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            # Testcontainers spins up real Postgres + Redis (Docker is preinstalled
            # on ubuntu runners).
            - name: Integration tests
              run: yarn test:integration

    e2e:
        name: E2E tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            - name: Install Playwright browsers
              run: yarn workspace @realtime-chatapp/client exec playwright install --with-deps
            - name: E2E tests
              run: yarn test:e2e
              env:
                  # The E2E client build must point at the disposable E2E server
                  # that playwright.config starts on :4000. Locally this comes from
                  # packages/client/.env (gitignored, absent in CI), so set it here.
                  VITE_API_BASE_URL: http://localhost:4000
            - name: Upload Playwright report
              if: ${{ failure() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      packages/client/playwright-report/
                      packages/client/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

    # Fires the Netlify build hook ONLY after every check passes, on pushes to
    # master. If any job fails, this is skipped and the client never deploys.
    # (Render gates the server independently via "After CI Checks Pass".)
    deploy-client:
        name: Deploy client (Netlify)
        needs: [lint, unit, integration, e2e]
        if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Netlify build hook
              env:
                  NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
              run: |
                  if [ -z "$NETLIFY_BUILD_HOOK" ]; then
                    echo "NETLIFY_BUILD_HOOK secret is not set" >&2
                    exit 1
                  fi
                  curl -fsSL -X POST -d '{}' "$NETLIFY_BUILD_HOOK"
