name: CI

on:
    push:
        branches: [master]
    pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint, format & typecheck
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            # Corepack activates the pinned Yarn 4 (package.json packageManager).
            # Must run before any `yarn` call; this is also why setup-node's
            # `cache: yarn` is not used (it would call Yarn before Corepack).
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            - name: Format check
              run: yarn format:check
            - name: Lint
              run: yarn lint
            # Strict tsc --noEmit gate for server + common (tsx runs the .ts at
            # runtime and does not type-check, so this is where types are enforced).
            - name: Typecheck
              run: yarn typecheck

    unit:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            - name: Unit tests
              run: yarn test

    integration:
        name: Integration tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            # Testcontainers spins up real Postgres + Redis (Docker is preinstalled
            # on ubuntu runners).
            - name: Integration tests
              run: yarn test:integration

    e2e:
        name: E2E tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            - name: Install Playwright browsers
              run: yarn workspace @realtime-chatapp/client exec playwright install --with-deps
            - name: E2E tests
              run: yarn test:e2e
              env:
                  # The E2E client build must point at the disposable E2E server
                  # that playwright.config starts on :4000. Locally this comes from
                  # packages/client/.env (gitignored, absent in CI), so set it here.
                  VITE_API_BASE_URL: http://localhost:4000
            - name: Upload Playwright report
              if: ${{ failure() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      packages/client/playwright-report/
                      packages/client/test-results/
                  if-no-files-found: ignore
                  retention-days: 7

    # Builds the server image and smoke-tests the whole Compose stack (server +
    # Postgres + Redis + the one-shot migrate job). Kept separate from the
    # integration/e2e jobs: those already drive the Docker daemon via Testcontainers,
    # and running them inside a build container would mean docker-in-docker.
    docker:
        name: Docker build & Compose smoke test
        runs-on: ubuntu-latest
        # Compose resolves `image:` first and only builds when it is absent, so the
        # image built (and cached) below is the one the stack actually runs.
        env:
            IMAGE_TAG: ci
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - name: Build server image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: false
                  load: true
                  tags: realtime-chatapp-server:ci
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
            # Proves the image actually boots against real Postgres + Redis, that
            # migrations apply, and that /health (the ALB/k8s probe target) answers.
            - name: Start the stack
              run: docker compose up -d --wait --wait-timeout 120
            - name: Health check
              run: curl -fsS --retry 5 --retry-all-errors --retry-delay 2 http://localhost:4000/health
            - name: Dump logs on failure
              if: ${{ failure() }}
              run: docker compose logs --no-color
            - name: Tear down
              if: ${{ always() }}
              run: docker compose down -v

    # Generates coverage and uploads it to Codecov. Informational only — this
    # job is intentionally NOT in deploy-client's needs, so coverage never blocks
    # a deploy. Codecov posts the project/patch status checks and PR comment
    # itself; gating happens at merge via branch protection (see codecov.yml).
    coverage:
        name: Coverage
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - name: Enable Corepack
              run: corepack enable
            - name: Install dependencies
              run: yarn install --immutable
            # Server = merged unit + integration (Docker); plus client and common.
            - name: Generate coverage
              run: |
                  yarn coverage:server
                  yarn workspace @realtime-chatapp/client test --coverage
                  yarn workspace @realtime-chatapp/common test --coverage
            - name: Upload server coverage (unit + integration)
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/server/coverage/merged/lcov.info
                  flags: server
                  fail_ci_if_error: false
                  # Upload ONLY the file above under this flag — without this,
                  # codecov auto-searches and uploads every coverage file under
                  # every flag, misattributing per-package coverage.
                  disable_search: true
            - name: Upload client coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/client/coverage/lcov.info
                  flags: client
                  fail_ci_if_error: false
                  disable_search: true
            - name: Upload common coverage
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/common/coverage/lcov.info
                  flags: common
                  fail_ci_if_error: false
                  disable_search: true

    # Fires the Netlify build hook ONLY after every check passes, on pushes to
    # master. If any job fails, this is skipped and the client never deploys.
    # (Render gates the server independently via "After CI Checks Pass".)
    deploy-client:
        name: Deploy client (Netlify)
        needs: [lint, unit, integration, e2e]
        if: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Netlify build hook
              env:
                  NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
              run: |
                  if [ -z "$NETLIFY_BUILD_HOOK" ]; then
                    echo "NETLIFY_BUILD_HOOK secret is not set" >&2
                    exit 1
                  fi
                  curl -fsSL -X POST -d '{}' "$NETLIFY_BUILD_HOOK"
